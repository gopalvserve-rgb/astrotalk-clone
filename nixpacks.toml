[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]
aptPkgs = ["ca-certificates"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9 --activate",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm --filter @astrotalk/web build"
]

[start]
cmd = "pnpm --filter @astrotalk/web start -- -p ${PORT:-3000}"
